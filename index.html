<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roll Review</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="logo rellax" data-rellax-speed="-5.5">
          <img src="./Images/text-logo.png" alt="" />
        </div>
        <div class="nav-links rellax" data-rellax-speed="-6.8">
          <a href="#">New Release</a>
          <a href="#">Top Rated</a>
          <a href="#">Genres</a>
          <a href="#">About</a>
        </div>
      </nav>
    </header>
    <main>
      <h1 class="rellax" data-rellax-speed="-1">
        Discover Your Next Favorite Film
      </h1>
      <p class="subtext rellax" data-rellax-speed="-1">
        Search millions of movies, watch trailers, read reviews
      </p>
      <div class="search-container rellax" data-rellax-speed="-1">
        <div class="search-bar">
          <input type="text" placeholder="e.g. Godfather" class="input" />
          <button class="search">Search</button>
        </div>
        <div class="suggestions"></div>
      </div>

      <div class="parallax">
        <img src="./Images/hill-with-text-cropped.svg" class="hill" />
        <img
          src="./Images/crew.png"
          class="film-crew rellax"
          data-rellax-speed="0.5" />
      </div>
    </main>

    <section class="results">
      <div class="results-header">
        <h2>Results for: <span></span></h2>
      </div>
      <div class="movie-grid"></div>
    </section>

    <div class="modal-backdrop">
      <div class="modal">
        <div class="modal-video">
          <button class="modal-close">✕</button>
          <iframe src="" class="trailer-video"></iframe>
        </div>

        <div class="modal-poster-p">
          <img src="" class="modal-poster" />
        </div>

        <div class="modal-info">
          <h1 class="modal-title"></h1>
          <div class="modal-meta">
            <span class="modal-year"></span>
            <span class="modal-runtime"></span>
            <span class="modal-rating">★ 7.5</span>
          </div>
          <p class="modal-genre"></p>
          <p class="modal-plot"></p>
          <p class="crew">Director: <span class="modal-director">Name</span></p>
          <p class="cast">Cast: <span class="modal-cast">Name</span></p>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/rellax/1.12.1/rellax.min.js"></script>
    <script src="script.js"></script>
  </body>
